# ========================================================
# STEAM DECK DOCK WAKEUP UTILITY CONFIGURATION
# ========================================================

[SETTINGS]
# Customizable delay buffer before re-enabling wake ears
sleep_buffer_seconds=10

[STATUS]
# Track features to verify persistence after SteamOS updates
udev_rules_installed=true
user_sleep_service_installed=true

[HARDWARE_PROFILES]
# Count of managed hubs to loop through
total_managed_hubs=2

# Raw pairing strings used by both udev and the sleep script
hub_1=2109:2817
hub_2=2109:0817
