# ==============================================================================
# File Name:    dock_wake.conf
# Description:   Central State Database for Steam Deck Dock Wakeup Utility
# Author:        boba-fatt
# Repository:    https://github.com/boba-fatt/SteamDock_USB_Wake
#
# Purpose:       Maintains the single source of truth for user preferences,
#                installation tracking metrics, and dynamic hardware profiles.
#                
# Note:          Modifying values in this file alters script behavior instantly.
#                Do not manually clear section headers, as backend automation
#                tools rely on these identifiers to read and write states.
# ==============================================================================

[SETTINGS]
# Customizable delay buffer before re-enabling wake ears
sleep_buffer_seconds=10

[STATUS]
# Track features to verify persistence after SteamOS updates
udev_rules_installed=false
user_sleep_service_installed=false

[HARDWARE_PROFILES]
# Summary tracking for installer scripting
total_managed_hubs=0

[MANAGED_HUBS]
# The installation script will write discovered IDs below this line
# Format should be a raw list of VID:PID strings (e.g., 2109:2817)
